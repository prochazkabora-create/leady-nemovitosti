    if (fs === "novy" && !jeNovy(l)) return false;
    if (fs === "_" && st) return false;
    if (fs && fs !== "novy" && fs !== "_" && st !== fs) return false;
    if (q) {
      const hay = [l.spisova_znacka, l.typ_dokumentu, l.poznamka, l.velikost_podilu,
        l.okres, l.kraj, l.spravce_jmeno,
        ...(l.katastralni_uzemi||[]), ...(l.lv||[]), ...(l.parcely||[])].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  rows.sort((a,b) => {
    let x = a[sortKey], y = b[sortKey];
    if (sortKey === "cena") { x = x ?? -1; y = y ?? -1; }
    else { x = x ?? ""; y = y ?? ""; }
    return (x<y?-1:x>y?1:0)*sortDir;
  });
  $("count").textContent = rows.length + " / " + DATA.length + " leadů";
  $("tb").innerHTML = rows.map(l => {
    const st = stavy[l.ref] || "";
    const badges = [
      jeNovy(l) ? '<span class="badge b-novy">NOVÉ</span>' : "",
      l.vecne_bremeno ? (l.vb_byt ? '<span class="badge b-vbbyt">VB bytu</span>'
                         : '<span class="badge b-vb">'+(l.vb_uzivani?"VB užívání":"VB")+'</span>') : "",
      l.podil ? '<span class="badge b-podil">podíl'+(l.velikost_podilu?" "+esc(l.velikost_podilu):"")+'</span>' : "",
      l.alimenty ? '<span class="badge b-alim" title="'+esc(l.alimenty_duvod||"")+'">výživné'+(l.alimenty_castka?' '+fmtKc(l.alimenty_castka):'')+'</span>' : "",
      l.prodej_mimo_drazbu ? '<span class="badge b-mimo">mimo dražbu</span>' : "",
      (l.dalsi_zdroje||[]).length ? '<span class="badge b-dup">'+(l.dalsi_zdroje.length+1)+' zdroje</span>' : "",
      probehla(l) ? '<span class="badge b-prosla">proběhlá</span>' : "",
    ].join("");
    const links = [
      l.dokument_url ? '<a href="'+esc(l.dokument_url)+'" target="_blank" rel="noopener">dokument</a>' : "",
      ...(l.dalsi_zdroje||[]).map(d => '<a href="'+esc(d.url)+'" target="_blank" rel="noopener" title="duplicitní zdroj">'+esc(d.zdroj)+'</a>'),
      l.katastr_url ? '<a href="'+esc(l.katastr_url)+'" target="_blank" rel="noopener">katastr</a>' : "",
      l.mapa_url ? '<a href="'+esc(l.mapa_url)+'" target="_blank" rel="noopener">mapa</a>' : "",
    ].filter(Boolean).join(" · ");
    const spravce = l.spravce_jmeno ? esc(l.spravce_jmeno)
      + (l.spravce_email ? '<br><a href="mailto:'+esc(l.spravce_email)+'">'+esc(l.spravce_email)+'</a>' : "")
      + (l.spravce_tel ? '<br>' + esc(l.spravce_tel) : "")
      + (!l.spravce_email && l.spravce_ds ? '<br>DS: '+esc(l.spravce_ds) : "")
      : [l.opravneny ? 'Opr.: '+esc(l.opravneny) : "",
         l.exekutor ? esc(l.exekutor) : ""].filter(Boolean).join('<br>');
    const cena = l.cena != null
      ? '<span class="cena">'+fmtKc(l.cena)+(l.cena_typ==="odhad"?' <small>odhad</small>':'')+'</span>' : "";
    const stavSel = '<select class="stav" data-ref="'+esc(l.ref)+'">'
      + ['','zájem','kontaktováno','nezajímavé'].map(s =>
          '<option value="'+s+'"'+(st===s?' selected':'')+'>'+(s||'—')+'</option>').join("")
      + '</select>';
    return '<tr class="'+(st==="nezajímavé"?"nezajem":jeNovy(l)?"novy":"")+'">'
      +"<td>"+esc(l.datum)+"</td><td>"+esc(l.zdroj)
      +"</td><td>"+esc(l.spisova_znacka)+'<div class="muted">'+esc(l.typ_dokumentu)+"</div></td>"
      +"<td>"+esc(l.typ_nemovitosti)+"</td><td>"+cena
      +"</td><td>"+esc(l.velikost_podilu||(l.podil?"?":"–"))
      +"</td><td>"+esc(l.okres)+(l.kraj?'<div class="muted">'+esc(l.kraj)+"</div>":"")
      +"</td><td>"+esc((l.katastralni_uzemi||[]).join(", "))+"</td><td>"+esc((l.lv||[]).join(", "))
      +"</td><td>"+esc((l.parcely||[]).slice(0,8).join(", "))+"</td><td>"+badges
      +'</td><td class="spravce">'+spravce+"</td><td>"+links+"</td><td>"+stavSel+"</td></tr>";
  }).join("");
  document.querySelectorAll("select.stav").forEach(sel => sel.onchange = () => {
    const ref = sel.dataset.ref;
    if (sel.value) stavy[ref] = sel.value; else delete stavy[ref];
    localStorage.setItem("leadStavy", JSON.stringify(stavy));
    render();
  });
}
document.querySelectorAll("th[data-s]").forEach(th => th.onclick = () => {
  const k = th.dataset.s;
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
  render();
});
["q","zdroj","typN","kraj","okres","cenaDo","fVb","fVbByt","fBezVb","fPodil","fAlim","fInsol","fBezPozemku","fBudouci","dOd","dDo","fStav"].forEach(id => $(id).addEventListener("input", render));
render();
</script>
</body>
</html>
