let sortKey = "datum", sortDir = -1;

const jeNovy = l => minulaNavsteva && (l.scanned_at || "") > minulaNavsteva;

function fillSelect(id, vals) {
  for (const v of vals) { const o = document.createElement("option"); o.value = o.textContent = v; $(id).appendChild(o); }
}

function render() {
  const q = $("q").value.toLowerCase(), z = $("zdroj").value, tn = $("typN").value,
        kr = $("kraj").value, ok = $("okres").value,
        vb = $("fVb").checked, bezVb = $("fBezVb").checked, pd = $("fPodil").checked,

  let rows = DATA.filter(l => {
    if (z && l.zdroj !== z) return false;
    if (tn === "?" ? l.typ_nemovitosti : (tn && l.typ_nemovitosti !== tn)) return false;
    if (kr && l.kraj !== kr) return false;
    if (ok && l.okres !== ok) return false;
    if (vb && !l.vecne_bremeno) return false;

    if (q) {
      const hay = [l.spisova_znacka, l.typ_dokumentu, l.poznamka, l.velikost_podilu,
        l.okres, l.kraj, l.spravce_jmeno,
        ...(l.katastralni_uzemi||[]), ...(l.lv||[]), ...(l.parcely||[])].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  rows.sort((a,b) => {
    let x = a[sortKey], y = b[sortKey];
    if (sortKey === "cena") { x = x ?? -1; y = y ?? -1; }

  });

      (l.dalsi_zdroje||[]).length ? '<span class="badge b-dup">'+(l.dalsi_zdroje.length+1)+' zdroje</span>' : "",
    ].join("");
    const links = [
      l.dokument_url ? '<a href="'+esc(l.dokument_url)+'" target="_blank" rel="noopener">dokument</a>' : "",
      ...(l.dalsi_zdroje||[]).map(d => '<a href="'+esc(d.url)+'" target="_blank" rel="noopener" title="duplicitní zdroj">'+esc(d.zdroj)+'</a>'),
      l.katastr_url ? '<a href="'+esc(l.katastr_url)+'" target="_blank" rel="noopener">katastr</a>' : "",
      l.mapa_url ? '<a href="'+esc(l.mapa_url)+'" target="_blank" rel="noopener">mapa</a>' : "",
    ].filter(Boolean).join(" · ");

});
